<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineMood</title>
    <link rel="stylesheet" href="style.css" />
    <script defer src="tema.js"></script>
    <script defer src="perfil.js"></script>
  </head>
  <body>
    <main class="profile-selection">
      <h1>Quem está assistindo?</h1>
      <ul class="profiles">
        <li class="profile">
          <a href="catalogo/catalogo.html">
            <figure>
              <img src="/assets/coelha.jpg" alt="Perfil 1" />
              <figcaption>Judy</figcaption>
            </figure>
          </a>
        </li>
        <li class="profile">
          <a href="catalogo/catalogo.html">
            <figure>
              <img src="/assets/raposa.jpg" alt="Perfil 2" />
              <figcaption>Nick</figcaption>
            </figure>
          </a>
        </li>
        <li class="profile">
          <a href="catalogo/catalogo.html">
            <figure>
              <img src="/assets/preguica.jpg" alt="Perfil 3" />
              <figcaption>Priscilla</figcaption>
            </figure>
          </a>
        </li>
        <li class="profile">
          <a href="catalogo/catalogo.html">
            <figure>
              <img src="/assets/touro.jpg" alt="Perfil 4" />
              <figcaption>Chefe Bogo</figcaption>
            </figure>
          </a>
        </li>

        <!-- Botão adicionar perfil -->
        <li class="profile perfil-adicionar">
          <figure>
            <div class="icone-adicionar">+</div>
            <figcaption>Adicionar</figcaption>
          </figure>
        </li>
      </ul>

      <button class="btn-gerenciar">Gerenciar perfis</button>
    </main>
  </body>
</html>
